name: Sync Stock Data Folders

on:
  schedule:
    # 09:30 & 09:45 IST
    - cron: "0,15 4 * * 1-5"

    # 10:00 AM to 03:45 PM IST (Every 15 Minutes)
    - cron: "30-59/15 4-9 * * 1-5"
    - cron: "0-45/15 5-10 * * 1-5"

    # 04:00, 04:15 & 04:30 PM IST
    - cron: "30 10 * * 1-5"
    - cron: "45 10 * * 1-5"
    - cron: "0 11 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    concurrency:
      group: stock-data-sync
      cancel-in-progress: false

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Sync Script
        run: |
          python Datacopier.py

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "🔄 Auto-sync stock data folders ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"

          git pull --rebase origin main || echo "Nothing to rebase"

          git push origin main
