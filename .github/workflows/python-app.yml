name: Sync Stock Data Folders

on:
  schedule:
    # 09:30, 09:40, 09:50 IST
    - cron: "0,10,20 4 * * 1-5"

    # 10:00 AM to 03:50 PM IST (Every 10 Minutes)
    - cron: "30-59/10 4-9 * * 1-5"
    - cron: "0-50/10 5-10 * * 1-5"

    # 04:00, 04:10, 04:20, 04:30 IST
    - cron: "30,40,50 10 * * 1-5"
    - cron: "0 11 * * 1-5"

  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    concurrency:
      group: stock-data-sync
      cancel-in-progress: false

    steps:
      - name: Checkout Current Repo
        uses: actions/checkout@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Run Sync Script
        run: python Datacopier.py

      - name: Commit & Push Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add .

          git diff --cached --quiet || git commit -m "🔄 Auto-sync stock data folders ($(date -u '+%Y-%m-%d %H:%M:%S UTC'))"

          git pull --rebase origin main || echo "Nothing to rebase"

          git push origin main
